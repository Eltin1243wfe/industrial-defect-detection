# spin up with: docker compose -f docker/docker-compose.yml up --build
version: "3.8"

services:
  defect-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # mount checkpoints from host so I don't have to rebuild the image
      # every time I train a new model version
      - ../checkpoints:/app/checkpoints
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
