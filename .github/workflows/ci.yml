name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: lint
        run: |
          pip install flake8
          # not being super strict here, just catching actual bugs (unused imports,
          # undefined names) rather than nitpicking style
          flake8 src/ --max-line-length=110 --select=E9,F63,F7,F82

      - name: run tests
        run: pytest tests/ -v
